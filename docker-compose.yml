services:

  # Базовый GPU-образ для STT, TTS, text_preprocessor (CUDA 12 + Python)
  gpu-base:
    build:
      context: ./gpu-base
    image: ai-gpu-base:latest

  # ── VK Music MCP server ───────────────────────────────────────────────────
  music-mcp:
    build:
      context: ./music-mcp
    restart: unless-stopped
    env_file: .env
    environment:
      TOKEN_FILE: /data/.vk_token
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - vk_data:/data
      - ${PULSE_SOCKET_PATH:-/run/user/1000/pulse/native}:/tmp/pulse-native:ro
    ports:
      - "${MCP_PORT:-8001}:8001"

  # ── Auth server (remote-browser VK login + token auto-refresh) ────────────
  auth:
    build:
      context: ./auth
    restart: unless-stopped
    env_file: .env
    environment:
      TOKEN_FILE:  /data/.vk_token
      STATE_FILE:  /data/playwright_state.json
      ENV_FILE: ""
      AUTH_PORT: "8080"
    volumes:
      - vk_data:/data
    ports:
      - "${AUTH_PORT:-8080}:8080"

  # ── Голосовой ассистент ─────────────────────────────────────────────────────
  stt:
    build:
      context: ./voice/stt
      dockerfile: Dockerfile.gpu   # Dockerfile.cpu
    environment:
      - LOG_LEVEL=INFO
      - MODEL_NAME=v3_e2e_rnnt
      - DEVICE=cuda
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    volumes:
      - stt_cache:/root/.cache
    ports:
      - "5001:5000"

  tts:
    build:
      context: ./voice/tts
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
      - TTS_SPEAKER=xenia
      - LOG_LEVEL=INFO
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    volumes:
      - tts_cache:/root/.cache
    ports:
      - "5002:5000"

  text_preprocessor:
    build:
      context: ./voice/text_preprocessor
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
      - PREPROCESSOR_MODEL_SIZE=big
      - HF_HOME=/root/.cache/huggingface
      - LOG_LEVEL=INFO
      - HF_HUB_DISABLE_PROGRESS_BARS=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    volumes:
      - preprocessor_cache:/root/.cache
    ports:
      - "5004:5000"

  controller:
    build:
      context: ./voice/controller
    env_file: .env
    environment:
      - PULSE_SERVER=unix:/tmp/pulse-native
      - LOG_LEVEL=INFO
      - AUDIO_RATE=16000
      - WAKE_BUFFER_SEC=2.0
      - COMMAND_BUFFER_SEC=2.0
      - WAKE_SLIDE_SEC=0.25
      - VAD_CHUNK_SIZE=512
      - VAD_WINDOW_SIZE=8000
      - VAD_SILENCE_CHUNKS=70
      - MIN_RECORDING_DURATION=0.2
      - RECORDING_GRACE_PERIOD=2.0
      - WAKE_REFERENCE_DIR=/app/wake_ref
      - WAKE_THRESHOLD=0.1
      - STOP_REF_DIR=/app/stop_ref
      - WAIT_REF_DIR=/app/wait_ref
      - COMMAND_THRESHOLD=0.10
      - SOUNDS_DIR=/app/sounds
      - WEBUI_DB_PATH=/app/webui_data/webui.db
      - VOICE_USER_ID=ec3ddb7c-ea1e-4672-a94d-7c92c9eab21e
      # MCP (music-mcp): те же инструменты что cli.py
      - MCPO_URL=http://music-mcp:8001
      # LLM: OpenAI-совместимый API (llama.cpp на хосте и т.д.)
      - LLM_URL=${LLM_URL:-http://host.docker.internal:8080/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-oss-20b-Q4_K_M.gguf}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - FOLLOW_UP_ENABLED=true
      - FOLLOW_UP_TIMEOUT=7.0
      - USE_TEXT_PREPROCESSOR=true
    volumes:
      - ${PULSE_SOCKET_PATH:-/run/user/1000/pulse/native}:/tmp/pulse-native:ro
      - ./voice/controller/wake_ref:/app/wake_ref
      - ./voice/controller/stop_ref:/app/stop_ref
      - ./voice/controller/wait_ref:/app/wait_ref
      - ./sounds:/app/sounds:ro
      - open_webui:/app/webui_data
    ports:
      - "5005:5000"
    depends_on:
      - music-mcp
      - stt
      - tts
      - text_preprocessor
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  vk_data:
  stt_cache:
  tts_cache:
  open_webui:
  preprocessor_cache:
